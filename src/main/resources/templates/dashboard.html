<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduNote - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 min-h-screen">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-100 border-r border-slate-200 flex flex-col">

        <div class="flex items-center gap-3 px-6 py-6">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i data-lucide="book-open" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="font-bold text-3xl text-blue-700">EduNote</h1>
        </div>

        <div class="px-5">
            <a href="/studies/new"
               class="flex items-center justify-center gap-2 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl py-3 transition">
                <i data-lucide="plus"></i>
                Nova Nota
            </a>
        </div>

        <nav class="mt-6 px-4 space-y-2">
            <a href="/dashboard"
               class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-100 text-blue-700 font-medium">
                <i data-lucide="layout-dashboard"></i>
                Dashboard
            </a>
            <a href="/categories"
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-200 transition">
                <i data-lucide="tag"></i>
                Categorias
            </a>
        </nav>

        <div class="mt-auto p-5">
            <a href="/logout"
               class="flex items-center justify-center gap-2 border border-red-200 text-red-500 hover:bg-red-50 rounded-xl py-3 transition">
                <i data-lucide="log-out"></i>
                Sair
            </a>
        </div>

    </aside>

    <!-- Conteúdo -->
    <main class="flex-1 p-10">

        <div class="flex items-start justify-between mb-16">
            <div>
                <h1 class="text-5xl font-bold text-slate-800">Seu Dashboard</h1>
                <p class="text-slate-500 mt-3 text-lg">
                    Bem-vindo de volta! Você tem
                    <span th:text="${#lists.size(studies)}">0</span>
                    notas ativas.
                </p>
            </div>
        </div>

        <h2 class="text-3xl font-bold text-slate-800 mb-8">Notas Recentes</h2>

        <!-- Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">

            <div th:each="study : ${studies}"
                 class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm hover:shadow-md transition">

                <!-- Categorias -->
                <div class="flex gap-2 flex-wrap mb-6">
                    <span th:each="cat : ${study.categories}"
                          th:text="${cat.name}"
                          class="px-3 py-1 rounded-full text-sm bg-blue-100 text-blue-600">
                    </span>
                    <span th:if="${#lists.isEmpty(study.categories)}"
                          class="px-3 py-1 rounded-full text-sm bg-slate-100 text-slate-400">
                        Sem categoria
                    </span>
                </div>

                <!-- Título -->
                <h3 class="text-2xl font-bold text-slate-800 mb-4"
                    th:text="${study.title}">
                </h3>

                <!-- Descrição -->
                <p class="text-slate-500 line-clamp-3 min-h-[60px]"
                   th:text="${study.description}">
                </p>

                <!-- Ações -->
                <div class="flex gap-3 mt-6">

                    <a th:href="@{/studies/{id}(id=${study.id})}"
                       class="flex-1 bg-orange-500 hover:bg-orange-600 text-white text-center font-semibold py-3 rounded-xl transition">
                        Ver Estudo
                    </a>

                    <!-- ✅ Botão IA agora aponta para a página do estudo onde ficam os botões de resumo/quiz -->
                    <a th:href="@{/studies/{id}(id=${study.id})}"
                       class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition">
                        <i data-lucide="sparkles"></i>
                        IA & Quiz
                    </a>

                </div>

            </div>

        </div>

        <!-- Estado vazio -->
        <div th:if="${#lists.isEmpty(studies)}"
             class="text-center py-24 text-slate-400">
            <i data-lucide="notebook" class="w-12 h-12 mx-auto mb-4"></i>
            <p class="text-xl">Nenhuma nota ainda. Crie a sua primeira!</p>
        </div>

    </main>

</div>

<script>lucide.createIcons();</script>
</body>
</html>
