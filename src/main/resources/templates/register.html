<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | EduNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">

    <div class="text-center mb-12">
        <div class="flex justify-center mb-3">
            <div class="bg-blue-600 p-3 rounded-xl">
                <i data-lucide="book-open" class="w-8 h-8 text-white"></i>
            </div>
        </div>
        <h1 class="text-5xl font-extrabold text-blue-700">EduNote</h1>
        <p class="text-slate-600 mt-3 text-lg">Clareza cognitiva para seus estudos.</p>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-lg p-10">

        <h2 class="text-4xl font-bold text-slate-800 mb-10">Criar Conta</h2>

        <form th:action="@{/register}" th:object="${user}" method="post" class="space-y-6">

            <div>
                <label class="block mb-2 text-slate-700 font-medium">Nome</label>
                <input th:field="*{name}" placeholder="Seu nome"
                       class="w-full px-4 py-4 rounded-xl border border-slate-300 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block mb-2 text-slate-700 font-medium">E-mail</label>
                <input type="email" th:field="*{email}" placeholder="nome@exemplo.com"
                       class="w-full px-4 py-4 rounded-xl border border-slate-300 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block mb-2 text-slate-700 font-medium">Senha</label>
                <input type="password" th:field="*{password}" placeholder="Crie uma senha"
                       class="w-full px-4 py-4 rounded-xl border border-slate-300 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit"
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-4 rounded-xl transition">
                Criar Conta
            </button>

        </form>

    </div>

    <!-- ✅ Link correto: a rota de login é "/" não "/login" -->
    <p class="text-center mt-8 text-slate-600">
        Já possui uma conta?
        <a href="/" class="text-blue-700 font-medium hover:underline">Entrar</a>
    </p>

</div>

<script>lucide.createIcons();</script>
</body>
</html>
