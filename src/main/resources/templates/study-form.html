<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Estudo | EduNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

<div class="flex min-h-screen">

    <aside class="w-60 bg-slate-100 border-r border-slate-200 flex flex-col">

        <div class="flex items-center gap-3 px-6 py-6">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i data-lucide="book-open" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="font-bold text-3xl text-blue-700">EduNote</h1>
        </div>

        <div class="px-5">
            <button form="studyForm" type="submit"
                    class="w-full flex items-center justify-center gap-2 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl py-3 transition">
                <i data-lucide="save"></i>
                Salvar Nota
            </button>
        </div>

        <nav class="mt-6 px-4 space-y-2">
            <a href="/dashboard"
               class="flex items-center gap-3 px-4 py-4 rounded-xl text-slate-600 hover:bg-slate-200 transition">
                <i data-lucide="layout-dashboard"></i>
                Dashboard
            </a>
            <a href="#"
               class="flex items-center gap-3 px-4 py-4 rounded-xl bg-blue-100 text-blue-700 font-medium">
                <i data-lucide="square-pen"></i>
                Editor
            </a>
        </nav>

        <div class="mt-auto p-5">
            <a href="/logout"
               class="flex items-center justify-center gap-2 border border-red-200 text-red-500 hover:bg-red-50 rounded-xl py-3 transition">
                <i data-lucide="log-out"></i>
                Sair
            </a>
        </div>

    </aside>

    <main class="flex-1 p-12">

        <div class="max-w-5xl mx-auto">

            <form id="studyForm"
                  th:action="@{/studies}"
                  th:object="${study}"
                  method="post">

                <div class="bg-white border border-slate-200 rounded-2xl p-10">

                    <div>
                        <label class="block text-slate-700 text-lg mb-4">Título da Nota</label>
                        <input type="text" th:field="*{title}"
                               placeholder="Digite o título do seu estudo..."
                               class="w-full text-5xl font-bold border-b-2 border-slate-200 focus:border-blue-500 outline-none py-4 placeholder:text-slate-300">
                    </div>

                    <div class="mt-10">
                        <label class="block text-slate-700 mb-3">Descrição</label>
                        <input type="text" th:field="*{description}"
                               placeholder="Breve descrição do conteúdo..."
                               class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="mt-12">
                        <label class="block text-slate-700 text-lg mb-4">Tags e Categorias</label>
                        <select multiple th:field="*{categories}"
                                class="w-full min-h-[140px] border border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}">
                            </option>
                        </select>
                        <p class="text-sm text-slate-500 mt-2">
                            Segure CTRL (Windows) ou CMD (Mac) para selecionar múltiplas categorias.
                        </p>
                    </div>

                    <div class="mt-12">
                        <label class="block text-slate-700 text-lg mb-4">Conteúdo</label>
                        <textarea th:field="*{content}" rows="18"
                                  placeholder="Comece a escrever suas notas aqui..."
                                  class="w-full border border-slate-200 rounded-2xl p-8 text-lg resize-none focus:ring-2 focus:ring-blue-500 outline-none">
                        </textarea>
                    </div>

                    <div class="flex justify-end gap-4 mt-8">
                        <!-- ✅ Cancelar vai para /dashboard, não /studies -->
                        <a href="/dashboard"
                           class="px-6 py-3 border border-slate-300 rounded-xl hover:bg-slate-100 transition">
                            Cancelar
                        </a>
                        <button type="submit"
                                class="px-8 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl transition">
                            Salvar Estudo
                        </button>
                    </div>

                </div>

            </form>

        </div>

    </main>

</div>

<script>lucide.createIcons();</script>
</body>
</html>
