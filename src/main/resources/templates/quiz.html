<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz | EduNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: Inter, sans-serif; }

        .option-label { transition: all 0.15s ease; }

        .option-input:checked + .option-label {
            border-color: #f97316;
            background-color: #fff7ed;
        }

        .option-input:checked + .option-label .option-circle {
            border-color: #f97316;
            background-color: #f97316;
        }

        .option-input:checked + .option-label .option-circle::after {
            content: '';
            display: block;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            margin: auto;
            margin-top: 3px;
        }
    </style>
</head>

<body class="bg-slate-50">
<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-60 bg-slate-100 border-r border-slate-200 flex flex-col">
        <div class="flex items-center gap-3 p-6">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i data-lucide="book-open" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-blue-700">EduNote</h1>
        </div>
        <div class="px-5">
            <a href="/studies/new"
               class="flex items-center justify-center gap-2 bg-orange-500 text-white py-3 rounded-xl font-semibold">
                <i data-lucide="plus"></i> Nova Nota
            </a>
        </div>
        <nav class="mt-6 px-4 space-y-2">
            <a href="/dashboard"
               class="flex items-center gap-3 px-4 py-4 rounded-xl text-slate-700 hover:bg-slate-200 transition">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="#"
               class="flex items-center gap-3 px-4 py-4 rounded-xl bg-blue-100 text-blue-700 font-semibold">
                <i data-lucide="clipboard-check"></i> Quiz
            </a>
        </nav>
        <div class="mt-auto p-5">
            <a href="/logout"
               class="flex items-center justify-center gap-2 border border-red-200 text-red-500 hover:bg-red-50 rounded-xl py-3 transition">
                <i data-lucide="log-out"></i> Sair
            </a>
        </div>
    </aside>

    <!-- CONTEÚDO -->
    <main class="flex-1">

        <!-- Top bar -->
        <div class="h-16 border-b border-slate-200 flex items-center justify-between px-8">
            <div class="flex items-center gap-3 text-slate-600">
                <i data-lucide="graduation-cap"></i>
                <span th:text="${study.title} + ' • Quiz IA'"></span>
            </div>
            <!-- Progresso -->
            <div class="flex items-center gap-3">
                <span class="text-slate-500 text-sm">
                    Questão
                    <span th:text="${questionIndex + 1}"></span>
                    de
                    <span th:text="${totalQuestions}"></span>
                </span>
                <div class="w-40 h-2 bg-slate-200 rounded-full">
                    <div class="h-2 bg-orange-500 rounded-full transition-all"
                         th:style="'width: ' + ${(questionIndex + 1) * 100 / totalQuestions} + '%'">
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-3xl mx-auto py-14 px-10">

            <!-- Badge da questão -->
            <div class="text-center mb-8">
                <span class="inline-block bg-blue-100 text-blue-700 px-4 py-2 rounded-full font-medium text-sm">
                    Questão <span th:text="${questionIndex + 1}"></span> de <span th:text="${totalQuestions}"></span>
                </span>
            </div>

            <!-- Pergunta -->
            <h1 class="text-3xl font-bold text-center text-slate-800 mb-12"
                th:text="${question.question}">
            </h1>

            <!-- Formulário de resposta -->
            <form th:action="@{/ai/quiz/{id}/question/{index}(id=${study.id}, index=${questionIndex})}"
                  method="post">

                <div class="space-y-4">

                    <div th:each="option : ${question.options.entrySet()}">

                        <input class="hidden option-input"
                               type="radio"
                               name="answer"
                               th:id="'opt-' + ${option.key}"
                               th:value="${option.key}"
                               th:checked="${selectedAnswer == option.key}">

                        <label th:for="'opt-' + ${option.key}"
                               class="option-label flex items-center gap-5 border-2 border-slate-200 rounded-2xl p-5 cursor-pointer hover:border-orange-300 bg-white">

                            <div class="option-circle w-6 h-6 rounded-full border-2 border-slate-300 flex-shrink-0"></div>

                            <div class="flex items-center gap-3">
                                <span class="font-bold text-orange-500 text-lg"
                                      th:text="${option.key} + ')'"></span>
                                <span class="text-slate-700 text-lg"
                                      th:text="${option.value}"></span>
                            </div>

                        </label>

                    </div>

                </div>

                <!-- Navegação -->
                <div class="flex justify-between items-center mt-12">

                    <!-- Anterior -->
                    <button th:if="${questionIndex > 0}"
                            type="submit" name="action" value="prev"
                            class="flex items-center gap-2 text-slate-600 font-semibold px-6 py-3 border border-slate-300 rounded-xl hover:bg-slate-100 transition">
                        <i data-lucide="arrow-left"></i> Anterior
                    </button>
                    <div th:if="${questionIndex == 0}"></div>

                    <div class="flex gap-4">

                        <!-- Finalizar (disponível a partir da última questão) -->
                        <button th:if="${isLast}"
                                type="submit" name="action" value="finish"
                                class="px-8 py-3 border border-blue-400 text-blue-700 font-semibold rounded-xl hover:bg-blue-50 transition">
                            Finalizar Quiz
                        </button>

                        <!-- Próxima -->
                        <button th:if="${!isLast}"
                                type="submit" name="action" value="next"
                                class="px-10 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl flex items-center gap-2 transition">
                            Próxima <i data-lucide="arrow-right"></i>
                        </button>

                        <!-- Última questão: botão de finalizar em destaque -->
                        <button th:if="${isLast}"
                                type="submit" name="action" value="finish"
                                class="px-10 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl flex items-center gap-2 transition">
                            Ver Resultado <i data-lucide="trophy"></i>
                        </button>

                    </div>

                </div>

            </form>

        </div>
    </main>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
