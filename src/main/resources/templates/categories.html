<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorias | EduNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen p-10">

<div class="max-w-xl mx-auto">

    <div class="flex items-center gap-3 mb-8">
        <div class="bg-blue-600 p-2 rounded-lg">
            <i data-lucide="book-open" class="w-6 h-6 text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-blue-700">EduNote</h1>
    </div>

    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-slate-800">Categorias</h2>
        <a href="/dashboard"
           class="text-slate-500 hover:text-slate-700 flex items-center gap-1 text-sm">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Voltar ao Dashboard
        </a>
    </div>

    <!-- Formulário de nova categoria -->
    <form th:action="@{/categories}"
          th:object="${category}"
          method="post"
          class="flex gap-3 mb-8">

        <input
                th:field="*{name}"
                placeholder="Nova categoria..."
                class="flex-1 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none bg-white">

        <button type="submit"
                class="bg-orange-500 hover:bg-orange-600 text-white font-semibold px-6 py-3 rounded-xl transition">
            Criar
        </button>

    </form>

    <!-- Lista de categorias -->
    <div class="space-y-3">
        <div th:each="cat : ${categories}"
             class="bg-white border border-slate-200 rounded-xl px-5 py-4 flex items-center gap-3">
            <i data-lucide="tag" class="w-4 h-4 text-blue-500"></i>
            <span class="text-slate-700 font-medium" th:text="${cat.name}"></span>
        </div>

        <div th:if="${#lists.isEmpty(categories)}"
             class="text-center text-slate-400 py-8">
            Nenhuma categoria criada ainda.
        </div>
    </div>

</div>

<script>lucide.createIcons();</script>
</body>
</html>
