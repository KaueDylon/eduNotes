<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${study.title} + ' | EduNote'"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ✅ Marked.js para renderizar markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .content-text { white-space: pre-wrap; line-height: 1.9; }

        /* ✅ Estilos para o markdown renderizado */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-weight: 700; color: #1e293b; margin: 1.2rem 0 0.5rem;
        }
        .markdown-body h1 { font-size: 1.5rem; }
        .markdown-body h2 { font-size: 1.25rem; }
        .markdown-body h3 { font-size: 1.1rem; }
        .markdown-body p { margin: 0.6rem 0; color: #475569; line-height: 1.8; }
        .markdown-body ul, .markdown-body ol {
            padding-left: 1.5rem; margin: 0.5rem 0; color: #475569;
        }
        .markdown-body li { margin: 0.3rem 0; }
        .markdown-body strong { color: #1e293b; }
        .markdown-body hr { border-color: #e2e8f0; margin: 1rem 0; }
    </style>
</head>

<body class="bg-slate-50">
<div class="flex min-h-screen">

    <aside class="w-60 bg-slate-100 border-r border-slate-200 flex flex-col">
        <div class="flex items-center gap-3 p-6">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i data-lucide="book-open" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-blue-700">EduNote</h1>
        </div>
        <div class="px-5">
            <a href="/studies/new"
               class="w-full flex justify-center items-center gap-2 bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold transition">
                <i data-lucide="plus"></i> Nova Nota
            </a>
        </div>
        <nav class="mt-6 px-4 space-y-2">
            <a href="/dashboard"
               class="flex items-center gap-3 px-4 py-4 rounded-xl text-slate-700 hover:bg-slate-200 transition">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="#"
               class="flex items-center gap-3 px-4 py-4 rounded-xl bg-blue-100 text-blue-700 font-medium">
                <i data-lucide="file-text"></i> Editor
            </a>
        </nav>
        <div class="mt-auto p-5">
            <a href="/logout"
               class="flex items-center justify-center gap-2 border border-red-200 text-red-500 hover:bg-red-50 rounded-xl py-3 transition">
                <i data-lucide="log-out"></i> Sair
            </a>
        </div>
    </aside>

    <main class="flex-1">
        <div class="max-w-4xl mx-auto px-12 py-20">

            <div class="mb-10">
                <h1 class="text-5xl font-bold text-slate-800" th:text="${study.title}"></h1>
                <p class="mt-4 text-slate-500 text-lg" th:text="${study.description}"></p>
            </div>

            <div class="flex gap-4 mb-12">
                <form th:action="@{/ai/summary/{id}(id=${study.id})}" method="post">
                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2">
                        <i data-lucide="sparkles"></i> Gerar Resumo IA
                    </button>
                </form>
                <form th:action="@{/ai/quiz/{id}(id=${study.id})}" method="post">
                    <button class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2">
                        <i data-lucide="brain"></i> Gerar Quiz
                    </button>
                </form>
            </div>

            <!-- Resumo IA com Markdown -->
            <div th:if="${summary != null and !#strings.isEmpty(summary)}"
                 class="bg-blue-50 border border-blue-200 rounded-2xl p-8 mb-12">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="sparkles" class="text-blue-600 w-5 h-5"></i>
                    <h2 class="text-xl font-bold text-blue-700">Resumo Gerado pela IA</h2>
                </div>
                <!-- ✅ div vazia que receberá o HTML do markdown via JS -->
                <div id="summary-content"
                     class="markdown-body"
                     th:attr="data-raw=${summary}">
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
                <h2 class="text-xl font-bold text-slate-700 mb-6">Conteúdo</h2>
                <article class="content-text text-lg text-slate-700"
                         th:text="${study.content}">
                </article>
            </div>

        </div>
    </main>
</div>

<script>
    lucide.createIcons();

    // ✅ Converte o markdown do resumo para HTML
    const summaryEl = document.getElementById('summary-content');
    if (summaryEl) {
        const raw = summaryEl.getAttribute('data-raw');
        summaryEl.innerHTML = marked.parse(raw);
    }
</script>
</body>
</html>
